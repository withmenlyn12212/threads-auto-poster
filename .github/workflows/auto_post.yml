# GitHub Actions — PC 꺼도 자동 실행되는 스케줄러
# 저장 위치: .github/workflows/auto_post.yml
# 텍스트 포스팅: 매일 오전 8시, 저녁 8시 (한국시간)
# 만화 포스팅: comic_post.yml 에서 낮 12시에 별도 실행

name: 스레드 텍스트 포스팅

on:
  schedule:
    - cron: '0 23 * * *'   # 한국 오전 8시 (UTC 23:00 전날)
    - cron: '0 11 * * *'   # 한국 저녁 8시 (UTC 11:00)
  workflow_dispatch:        # 수동 실행 버튼 (GitHub에서 클릭으로 즉시 실행)

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 자동 포스팅 실행
        env:
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python threads_auto_poster.py
